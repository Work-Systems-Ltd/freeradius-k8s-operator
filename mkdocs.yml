site_name: FreeRADIUS Kubernetes Operator
site_url: https://Work-Systems-Ltd.github.io/freeradius-k8s-operator/
repo_url: https://github.com/Work-Systems-Ltd/freeradius-k8s-operator
repo_name: Work-Systems-Ltd/freeradius-k8s-operator
site_description: Declarative RADIUS infrastructure on Kubernetes
copyright: Copyright &copy; 2024-2026 Work Systems Ltd

theme:
  name: material
  logo: assets/images/logo.png
  favicon: assets/images/logo.png
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: DM Sans
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts: concepts.md
  - Architecture: architecture.md
  - CRD Reference:
    - reference/index.md
    - RadiusCluster: reference/radiuscluster.md
    - RadiusClient: reference/radiusclient.md
    - RadiusPolicy: reference/radiuspolicy.md
  - Guides:
    - guides/index.md
    - Writing Policies: guides/policy.md
    - Modules: guides/modules.md
    - Autoscaling: guides/autoscaling.md
    - TLS Configuration: guides/tls.md
    - Observability: guides/observability.md
    - Security: guides/security.md
    - Upgrading: guides/upgrade.md
  - Examples: examples.md
  - Development: development.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
