apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: radiusclusters.radius.operator.io
spec:
  group: radius.operator.io
  names:
    kind: RadiusCluster
    listKind: RadiusClusterList
    plural: radiusclusters
    singular: radiuscluster
    shortNames:
      - rc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - image
              properties:
                replicas:
                  type: integer
                  format: int32
                  minimum: 1
                  default: 1
                image:
                  type: string
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                autoscaling:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    minReplicas:
                      type: integer
                      format: int32
                    maxReplicas:
                      type: integer
                      format: int32
                    targetCPUUtilizationPercentage:
                      type: integer
                      format: int32
                tls:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    secretRef:
                      type: object
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                probes:
                  type: object
                  properties:
                    liveness:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    readiness:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                modules:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - type
                      - enabled
                    properties:
                      name:
                        type: string
                      type:
                        type: string
                      enabled:
                        type: boolean
                      sql:
                        type: object
                        properties:
                          dialect:
                            type: string
                            enum: [mysql, postgresql, sqlite, mssql, oracle, mongo]
                          server:
                            type: string
                          port:
                            type: integer
                            format: int32
                          database:
                            type: string
                          login:
                            type: string
                          passwordRef:
                            type: object
                            properties:
                              name:
                                type: string
                              key:
                                type: string
                      ldap:
                        type: object
                        properties:
                          server:
                            type: string
                          port:
                            type: integer
                            format: int32
                          baseDN:
                            type: string
                          identity:
                            type: string
                          passwordRef:
                            type: object
                            properties:
                              name:
                                type: string
                              key:
                                type: string
                      eap:
                        type: object
                        properties:
                          defaultEAPType:
                            type: string
                          tls:
                            type: object
                            properties:
                              certFile:
                                type: string
                              keyFile:
                                type: string
                          ttls:
                            type: object
                            properties:
                              defaultEAPType:
                                type: string
                              virtualServer:
                                type: string
                          peap:
                            type: object
                            properties:
                              defaultEAPType:
                                type: string
                              virtualServer:
                                type: string
                      rest:
                        type: object
                        properties:
                          connectURI:
                            type: string
                          auth:
                            type: string
                          passwordRef:
                            type: object
                            properties:
                              name:
                                type: string
                              key:
                                type: string
                          authorize:
                            type: object
                            properties:
                              uri:
                                type: string
                              method:
                                type: string
                          authenticate:
                            type: object
                            properties:
                              uri:
                                type: string
                              method:
                                type: string
                          preacct:
                            type: object
                            properties:
                              uri:
                                type: string
                              method:
                                type: string
                          accounting:
                            type: object
                            properties:
                              uri:
                                type: string
                              method:
                                type: string
                          postAuth:
                            type: object
                            properties:
                              uri:
                                type: string
                              method:
                                type: string
                          preProxy:
                            type: object
                            properties:
                              uri:
                                type: string
                              method:
                                type: string
                          postProxy:
                            type: object
                            properties:
                              uri:
                                type: string
                              method:
                                type: string
                      redis:
                        type: object
                        properties:
                          server:
                            type: string
                          port:
                            type: integer
                            format: int32
                          database:
                            type: integer
                            format: int32
                          passwordRef:
                            type: object
                            properties:
                              name:
                                type: string
                              key:
                                type: string
                # ISP-scale features
                pdb:
                  type: object
                  properties:
                    minAvailable:
                      x-kubernetes-int-or-string: true
                    maxUnavailable:
                      x-kubernetes-int-or-string: true
                affinity:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                topologySpreadConstraints:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                service:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [ClusterIP, LoadBalancer, NodePort]
                      default: ClusterIP
                    loadBalancerIP:
                      type: string
                    externalTrafficPolicy:
                      type: string
                      enum: [Cluster, Local]
                    annotations:
                      type: object
                      additionalProperties:
                        type: string
                coa:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    port:
                      type: integer
                      format: int32
                initResources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                readyReplicas:
                  type: integer
                  format: int32
                currentImage:
                  type: string
                podRestarts:
                  type: integer
                  format: int32
                serviceIP:
                  type: string
                externalIPs:
                  type: array
                  items:
                    type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      additionalPrinterColumns:
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
