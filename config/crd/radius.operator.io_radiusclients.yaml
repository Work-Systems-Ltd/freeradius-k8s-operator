apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: radiusclients.radius.operator.io
spec:
  group: radius.operator.io
  names:
    kind: RadiusClient
    listKind: RadiusClientList
    plural: radiusclients
    singular: radiusclient
    shortNames:
      - rcl
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - clusterRef
                - ip
                - secretRef
              properties:
                clusterRef:
                  type: string
                ip:
                  type: string
                  pattern: '^((\d{1,3}\.){3}\d{1,3}(\/\d{1,2})?|([0-9a-fA-F:.]+)(\/\d{1,3})?)$'
                secretRef:
                  type: object
                  required:
                    - name
                    - key
                  properties:
                    name:
                      type: string
                    key:
                      type: string
                nasType:
                  type: string
                metadata:
                  type: object
                  additionalProperties:
                    type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      additionalPrinterColumns:
        - name: ClusterRef
          type: string
          jsonPath: .spec.clusterRef
        - name: IP
          type: string
          jsonPath: .spec.ip
        - name: NASType
          type: string
          jsonPath: .spec.nasType
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
