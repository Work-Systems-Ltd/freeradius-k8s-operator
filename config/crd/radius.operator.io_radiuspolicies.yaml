apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: radiuspolicies.radius.operator.io
spec:
  group: radius.operator.io
  names:
    kind: RadiusPolicy
    listKind: RadiusPolicyList
    plural: radiuspolicies
    singular: radiuspolicy
    shortNames:
      - rp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - clusterRef
                - stage
                - priority
              properties:
                clusterRef:
                  type: string
                stage:
                  type: string
                  enum:
                    - authorize
                    - authenticate
                    - preacct
                    - accounting
                    - post-auth
                    - pre-proxy
                    - post-proxy
                    - session
                priority:
                  type: integer
                  format: int32
                match:
                  type: object
                  properties:
                    all:
                      type: array
                      items:
                        type: object
                        required:
                          - attribute
                          - operator
                          - value
                        properties:
                          attribute:
                            type: string
                          operator:
                            type: string
                          value:
                            type: string
                    any:
                      type: array
                      items:
                        type: object
                        required:
                          - attribute
                          - operator
                          - value
                        properties:
                          attribute:
                            type: string
                          operator:
                            type: string
                          value:
                            type: string
                    none:
                      type: array
                      items:
                        type: object
                        required:
                          - attribute
                          - operator
                          - value
                        properties:
                          attribute:
                            type: string
                          operator:
                            type: string
                          value:
                            type: string
                actions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                    properties:
                      type:
                        type: string
                        enum:
                          - set
                          - call
                          - reject
                          - accept
                      module:
                        type: string
                      attribute:
                        type: string
                      value:
                        type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      additionalPrinterColumns:
        - name: ClusterRef
          type: string
          jsonPath: .spec.clusterRef
        - name: Stage
          type: string
          jsonPath: .spec.stage
        - name: Priority
          type: integer
          jsonPath: .spec.priority
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
