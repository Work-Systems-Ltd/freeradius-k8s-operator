services:
  kind-setup:
    image: registry.k8s.io/kindest/node:v1.29.2
    privileged: true
    volumes:
      - ./dev:/dev-output
      - /lib/modules:/lib/modules:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Waiting for Docker socket..."
        until [ -S /var/run/docker.sock ]; do sleep 1; done
        if ! kind get clusters 2>/dev/null | grep -q freeradius-dev; then
          kind create cluster \
            --name freeradius-dev \
            --config /dev-output/kind-config.yaml \
            --kubeconfig /dev-output/kubeconfig \
            --wait 120s
        fi
        echo "Kind cluster ready"
        tail -f /dev/null
    healthcheck:
      test: ["CMD", "kubectl", "--kubeconfig=/dev-output/kubeconfig", "cluster-info"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  postgres:
    image: docker.io/library/postgres:15-alpine
    environment:
      POSTGRES_DB: radius
      POSTGRES_USER: radius
      POSTGRES_PASSWORD: radius
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radius"]
      interval: 5s
      timeout: 3s
      retries: 10

  radtest:
    image: docker.io/freeradius/freeradius-server:3.2.3
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "radtest client ready — use: docker compose exec radtest radtest user password <host>:1812 0 testing123"
        tail -f /dev/null
    depends_on:
      kind-setup:
        condition: service_healthy
